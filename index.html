<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Claude Voice</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Syne:wght@400;600;800&family=DM+Mono:wght@300;400&display=swap');

  :root {
    --bg: #0a0a0f;
    --surface: #111118;
    --border: #1e1e2e;
    --accent: #7c6aff;
    --accent2: #ff6a9b;
    --text: #e8e6f0;
    --muted: #5a5870;
    --pulse: #7c6aff;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Mono', monospace;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    position: relative;
  }

  /* Background grid */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(var(--border) 1px, transparent 1px),
      linear-gradient(90deg, var(--border) 1px, transparent 1px);
    background-size: 40px 40px;
    opacity: 0.3;
    z-index: 0;
  }

  /* Glow orb */
  .orb {
    position: fixed;
    width: 600px;
    height: 600px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(124,106,255,0.08) 0%, transparent 70%);
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    pointer-events: none;
    z-index: 0;
    transition: background 0.5s ease;
  }
  .orb.listening {
    background: radial-gradient(circle, rgba(124,106,255,0.18) 0%, transparent 70%);
    animation: orb-pulse 1.5s ease-in-out infinite;
  }
  .orb.speaking {
    background: radial-gradient(circle, rgba(255,106,155,0.14) 0%, transparent 70%);
    animation: orb-pulse 0.8s ease-in-out infinite;
  }

  @keyframes orb-pulse {
    0%, 100% { transform: translate(-50%, -50%) scale(1); }
    50% { transform: translate(-50%, -50%) scale(1.08); }
  }

  .container {
    position: relative;
    z-index: 1;
    width: 100%;
    max-width: 680px;
    padding: 24px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 32px;
  }

  /* Header */
  .header {
    text-align: center;
  }
  .header h1 {
    font-family: 'Syne', sans-serif;
    font-weight: 800;
    font-size: 2rem;
    letter-spacing: -0.03em;
    background: linear-gradient(135deg, var(--accent) 0%, var(--accent2) 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }
  .header p {
    color: var(--muted);
    font-size: 0.75rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    margin-top: 4px;
  }

  /* API Key input */
  .api-section {
    width: 100%;
    display: flex;
    gap: 8px;
  }
  .api-section input {
    flex: 1;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 10px 14px;
    color: var(--text);
    font-family: 'DM Mono', monospace;
    font-size: 0.78rem;
    outline: none;
    transition: border-color 0.2s;
  }
  .api-section input:focus {
    border-color: var(--accent);
  }
  .api-section input::placeholder { color: var(--muted); }
  .btn-save {
    background: var(--accent);
    border: none;
    border-radius: 10px;
    padding: 10px 18px;
    color: white;
    font-family: 'Syne', sans-serif;
    font-weight: 600;
    font-size: 0.8rem;
    cursor: pointer;
    transition: opacity 0.2s, transform 0.1s;
  }
  .btn-save:hover { opacity: 0.85; }
  .btn-save:active { transform: scale(0.97); }

  /* Visualizer */
  .visualizer-wrap {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 20px;
  }

  .wave-container {
    width: 200px;
    height: 200px;
    position: relative;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .ring {
    position: absolute;
    border-radius: 50%;
    border: 1px solid var(--accent);
    opacity: 0.15;
    transition: all 0.3s ease;
  }
  .ring-1 { width: 200px; height: 200px; }
  .ring-2 { width: 160px; height: 160px; opacity: 0.2; }
  .ring-3 { width: 120px; height: 120px; opacity: 0.25; }

  .ring.active {
    animation: ring-expand 1.5s ease-out infinite;
  }
  .ring.active.ring-2 { animation-delay: 0.3s; }
  .ring.active.ring-3 { animation-delay: 0.6s; }

  @keyframes ring-expand {
    0% { transform: scale(0.9); opacity: 0.4; }
    100% { transform: scale(1.15); opacity: 0; }
  }

  .mic-btn {
    width: 80px;
    height: 80px;
    border-radius: 50%;
    border: none;
    background: linear-gradient(135deg, var(--accent), #5b4de0);
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: transform 0.15s, box-shadow 0.2s;
    box-shadow: 0 0 30px rgba(124,106,255,0.3);
    position: relative;
    z-index: 2;
  }
  .mic-btn:hover {
    transform: scale(1.06);
    box-shadow: 0 0 45px rgba(124,106,255,0.5);
  }
  .mic-btn:active { transform: scale(0.96); }
  .mic-btn.listening {
    background: linear-gradient(135deg, #ff6a9b, #e0364a);
    box-shadow: 0 0 45px rgba(255,106,155,0.5);
    animation: mic-pulse 0.8s ease-in-out infinite;
  }
  .mic-btn.speaking {
    background: linear-gradient(135deg, #6affb2, #20a060);
    box-shadow: 0 0 45px rgba(106,255,178,0.4);
  }
  .mic-btn svg { width: 32px; height: 32px; fill: white; }

  @keyframes mic-pulse {
    0%, 100% { box-shadow: 0 0 45px rgba(255,106,155,0.5); }
    50% { box-shadow: 0 0 65px rgba(255,106,155,0.8); }
  }

  .status-label {
    font-family: 'Syne', sans-serif;
    font-weight: 600;
    font-size: 0.85rem;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--muted);
    transition: color 0.3s;
    min-height: 20px;
  }
  .status-label.listening { color: var(--accent2); }
  .status-label.speaking { color: #6affb2; }
  .status-label.thinking { color: var(--accent); }

  /* Transcript area */
  .transcript-area {
    width: 100%;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 20px;
    min-height: 180px;
    max-height: 300px;
    overflow-y: auto;
    display: flex;
    flex-direction: column;
    gap: 12px;
  }
  .transcript-area::-webkit-scrollbar { width: 4px; }
  .transcript-area::-webkit-scrollbar-track { background: transparent; }
  .transcript-area::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  .msg {
    display: flex;
    flex-direction: column;
    gap: 3px;
    animation: msg-in 0.3s ease;
  }
  @keyframes msg-in {
    from { opacity: 0; transform: translateY(6px); }
    to { opacity: 1; transform: translateY(0); }
  }
  .msg-label {
    font-size: 0.65rem;
    text-transform: uppercase;
    letter-spacing: 0.12em;
    color: var(--muted);
  }
  .msg.user .msg-label { color: var(--accent); }
  .msg.assistant .msg-label { color: var(--accent2); }
  .msg-text {
    font-size: 0.88rem;
    line-height: 1.6;
    color: var(--text);
  }

  .empty-state {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    color: var(--muted);
    font-size: 0.78rem;
    text-align: center;
    line-height: 1.8;
  }

  /* Controls */
  .controls {
    display: flex;
    gap: 10px;
    align-items: center;
  }
  .btn-secondary {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 8px 16px;
    color: var(--muted);
    font-family: 'DM Mono', monospace;
    font-size: 0.75rem;
    cursor: pointer;
    transition: all 0.2s;
  }
  .btn-secondary:hover {
    border-color: var(--accent);
    color: var(--text);
  }

  /* Voice selector */
  .voice-select {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 8px 12px;
    color: var(--text);
    font-family: 'DM Mono', monospace;
    font-size: 0.75rem;
    cursor: pointer;
    outline: none;
  }
  .voice-select option { background: var(--surface); }

  /* Thinking dots */
  .thinking-dots span {
    animation: blink 1.2s infinite;
  }
  .thinking-dots span:nth-child(2) { animation-delay: 0.2s; }
  .thinking-dots span:nth-child(3) { animation-delay: 0.4s; }
  @keyframes blink {
    0%, 80%, 100% { opacity: 0; }
    40% { opacity: 1; }
  }

  .info-bar {
    font-size: 0.7rem;
    color: var(--muted);
    text-align: center;
    line-height: 1.6;
  }
  .info-bar a { color: var(--accent); text-decoration: none; }
</style>
</head>
<body>

<div class="orb" id="orb"></div>

<div class="container">
  <div class="header">
    <h1>Claude Voice</h1>
    <p>Asistente de voz · Web Speech API</p>
  </div>

  <div class="api-section">
    <input type="password" id="apiKey" placeholder="Pega tu Anthropic API Key aquí..." />
    <button class="btn-save" onclick="saveKey()">Guardar</button>
  </div>

  <div class="visualizer-wrap">
    <div class="wave-container">
      <div class="ring ring-1" id="ring1"></div>
      <div class="ring ring-2" id="ring2"></div>
      <div class="ring ring-3" id="ring3"></div>
      <button class="mic-btn" id="micBtn" onclick="toggleListening()">
        <svg id="micIcon" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
          <path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/>
          <path d="M19 10v2a7 7 0 0 1-14 0v-2H3v2a9 9 0 0 0 8 8.94V23h2v-2.06A9 9 0 0 0 21 12v-2h-2z"/>
        </svg>
      </button>
    </div>
    <div class="status-label" id="statusLabel">Presiona para hablar</div>
  </div>

  <div class="transcript-area" id="transcriptArea">
    <div class="empty-state" id="emptyState">
      Configura tu API Key y presiona el micrófono<br>para comenzar a hablar con Claude
    </div>
  </div>

  <div class="controls">
    <select class="voice-select" id="voiceSelect" onchange="selectVoice()">
      <option value="">Cargando voces...</option>
    </select>
    <button class="btn-secondary" onclick="clearHistory()">Limpiar</button>
    <button class="btn-secondary" onclick="stopSpeaking()">⏹ Silenciar</button>
  </div>

  <div class="info-bar">
    Funciona en Chrome/Edge · Voz procesada localmente · API calls a Anthropic
  </div>
</div>

<script>
  // ── State ──────────────────────────────────────────────────────────────────
  let apiKey = localStorage.getItem('claude_voice_key') || '';
  let isListening = false;
  let isSpeaking = false;
  let recognition = null;
  let synth = window.speechSynthesis;
  let selectedVoice = null;
  let conversationHistory = [];
  let voices = [];

  // ── Init ───────────────────────────────────────────────────────────────────
  if (apiKey) {
    document.getElementById('apiKey').value = '••••••••••••••••••••';
  }

  function saveKey() {
    const val = document.getElementById('apiKey').value.trim();
    if (val && !val.startsWith('•')) {
      apiKey = val;
      localStorage.setItem('claude_voice_key', val);
      document.getElementById('apiKey').value = '••••••••••••••••••••';
      setStatus('API Key guardada ✓', '');
      setTimeout(() => setStatus('Presiona para hablar', ''), 2000);
    }
  }

  // ── Voices ─────────────────────────────────────────────────────────────────
  function loadVoices() {
    voices = synth.getVoices();
    const sel = document.getElementById('voiceSelect');
    sel.innerHTML = '';

    // Prefer Spanish voices
    const spanish = voices.filter(v => v.lang.startsWith('es'));
    const others = voices.filter(v => !v.lang.startsWith('es'));
    const sorted = [...spanish, ...others];

    sorted.forEach((v, i) => {
      const opt = document.createElement('option');
      opt.value = i;
      opt.textContent = `${v.name} (${v.lang})`;
      opt.dataset.index = voices.indexOf(v);
      sel.appendChild(opt);
    });

    // Auto-select first Spanish voice
    if (spanish.length > 0) {
      selectedVoice = spanish[0];
      sel.value = 0;
    }
  }

  synth.onvoiceschanged = loadVoices;
  loadVoices();

  function selectVoice() {
    const sel = document.getElementById('voiceSelect');
    const idx = parseInt(sel.selectedOptions[0]?.dataset.index);
    if (!isNaN(idx)) selectedVoice = voices[idx];
  }

  // ── Speech Recognition ─────────────────────────────────────────────────────
  function setupRecognition() {
    const SpeechRec = window.SpeechRecognition || window.webkitSpeechRecognition;
    if (!SpeechRec) {
      alert('Tu navegador no soporta Speech Recognition. Usa Chrome o Edge.');
      return null;
    }
    const rec = new SpeechRec();
    rec.lang = 'es-MX';
    rec.interimResults = false;
    rec.maxAlternatives = 1;

    rec.onstart = () => {
      setListeningState(true);
    };

    rec.onresult = (e) => {
      const transcript = e.results[0][0].transcript;
      addMessage('user', transcript);
      setThinkingState();
      sendToClaude(transcript);
    };

    rec.onerror = (e) => {
      console.error('Speech error:', e.error);
      if (e.error === 'not-allowed') {
        setStatus('Permiso de micrófono denegado', '');
      } else {
        setStatus('Error: ' + e.error, '');
      }
      setIdleState();
    };

    rec.onend = () => {
      if (isListening) setListeningState(false);
    };

    return rec;
  }

  function toggleListening() {
    if (!apiKey) {
      setStatus('⚠ Primero configura tu API Key', '');
      document.getElementById('apiKey').focus();
      return;
    }
    if (isSpeaking) {
      stopSpeaking();
      return;
    }
    if (isListening) {
      recognition?.stop();
      setIdleState();
    } else {
      recognition = setupRecognition();
      if (recognition) recognition.start();
    }
  }

  // ── Helpers ────────────────────────────────────────────────────────────────
  function getNow() {
    const now = new Date();
    const dias = ['domingo','lunes','martes','miércoles','jueves','viernes','sábado'];
    const meses = ['enero','febrero','marzo','abril','mayo','junio','julio','agosto','septiembre','octubre','noviembre','diciembre'];
    const dia = dias[now.getDay()];
    const fecha = `${now.getDate()} de ${meses[now.getMonth()]} de ${now.getFullYear()}`;
    const hora = now.toLocaleTimeString('es-MX', { hour: '2-digit', minute: '2-digit', hour12: true });
    return `Hoy es ${dia}, ${fecha}. Son las ${hora} hora de México (Mérida, Yucatán, UTC-6).`;
  }

  // Limpia el texto para que suene natural al hablarlo
  function cleanForSpeech(text) {
    return text
      .replace(/\*\*(.*?)\*\*/g, '$1')
      .replace(/\*(.*?)\*/g, '$1')
      .replace(/#{1,6}\s/g, '')
      .replace(/`{1,3}[^`]*`{1,3}/g, '')
      .replace(/\[([^\]]+)\]\([^)]+\)/g, '$1')
      .replace(/[-•–]\s/g, '')
      .replace(/\n{2,}/g, '. ')
      .replace(/\n/g, ', ')
      .replace(/\s{2,}/g, ' ')
      .trim();
  }

  // ── Claude API ──────────────────────────────────────────────────────────────
  async function sendToClaude(userText) {
    conversationHistory.push({ role: 'user', content: userText });

    const systemPrompt = `Eres un asistente de voz personal llamado Claude, creado por Anthropic. Eres inteligente, curioso y muy conversacional.

CONTEXTO TEMPORAL: ${getNow()}

REGLAS DE RESPUESTA PARA VOZ:
- Responde de forma natural y fluida, como si hablaras con un amigo.
- Usa oraciones completas y naturales, nunca listas con guiones ni asteriscos.
- Evita completamente markdown, símbolos especiales, paréntesis con aclaraciones técnicas.
- Sé conciso pero completo. Máximo 3-4 oraciones para preguntas simples.
- Si no sabes algo o puede haber cambiado recientemente, dilo con honestidad.
- Responde siempre en español a menos que el usuario hable en otro idioma.
- Cuando menciones números, escríbelos en palabras si suenan mejor hablados.
- Nunca empieces con "¡Claro!" o "¡Por supuesto!" — varía tus respuestas.`;

    try {
      const response = await fetch('https://api.anthropic.com/v1/messages', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'x-api-key': apiKey,
          'anthropic-version': '2023-06-01',
          'anthropic-dangerous-direct-browser-access': 'true'
        },
        body: JSON.stringify({
          model: 'claude-sonnet-4-20250514',
          max_tokens: 1024,
          system: systemPrompt,
          tools: [{ type: 'web_search_20250305', name: 'web_search' }],
          messages: conversationHistory
        })
      });

      if (!response.ok) {
        const err = await response.json();
        throw new Error(err.error?.message || 'API error ' + response.status);
      }

      const data = await response.json();

      // Extrae solo los bloques de texto de la respuesta (ignora tool_use)
      const textBlocks = data.content.filter(b => b.type === 'text');
      const reply = textBlocks.map(b => b.text).join(' ').trim();

      if (reply) {
        conversationHistory.push({ role: 'assistant', content: data.content });
        addMessage('assistant', reply);
        speak(cleanForSpeech(reply));
      } else {
        // Si solo usó herramientas sin texto final, mostrar buscando...
        addMessage('assistant', '🔍 Buscando información...');
        setIdleState();
      }

    } catch (err) {
      console.error(err);
      addMessage('assistant', 'Hubo un error: ' + err.message);
      setIdleState();
    }
  }

  // ── TTS ────────────────────────────────────────────────────────────────────
  function speak(text) {
    synth.cancel();
    const sentences = text.match(/[^.!?]+[.!?]+/g) || [text];
    let idx = 0;
    function speakNext() {
      if (idx >= sentences.length) { setIdleState(); return; }
      const utt = new SpeechSynthesisUtterance(sentences[idx].trim());
      utt.lang = 'es-MX';
      if (selectedVoice) utt.voice = selectedVoice;
      utt.rate = 0.95;
      utt.pitch = 1.05;
      utt.volume = 1;
      if (idx === 0) utt.onstart = () => setSpeakingState();
      utt.onend = () => { idx++; speakNext(); };
      utt.onerror = () => setIdleState();
      synth.speak(utt);
    }
    speakNext();
  }

  function stopSpeaking() {
    synth.cancel();
    setIdleState();
  }

  // ── UI States ──────────────────────────────────────────────────────────────
  function setListeningState(on) {
    isListening = on;
    const btn = document.getElementById('micBtn');
    const orb = document.getElementById('orb');
    const rings = ['ring1','ring2','ring3'].map(id => document.getElementById(id));

    if (on) {
      btn.classList.add('listening');
      btn.classList.remove('speaking');
      orb.classList.add('listening');
      rings.forEach(r => r.classList.add('active'));
      setStatus('Escuchando...', 'listening');
    } else {
      btn.classList.remove('listening');
      orb.classList.remove('listening');
      rings.forEach(r => r.classList.remove('active'));
    }
  }

  function setSpeakingState() {
    isSpeaking = true;
    isListening = false;
    const btn = document.getElementById('micBtn');
    const orb = document.getElementById('orb');
    btn.classList.remove('listening');
    btn.classList.add('speaking');
    orb.classList.remove('listening');
    orb.classList.add('speaking');

    // Change icon to speaker
    document.getElementById('micIcon').innerHTML = `
      <path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02z"/>
      <path d="M14 3.23v2.06c2.89.86 5 3.54 5 6.71s-2.11 5.85-5 6.71v2.06c4.01-.91 7-4.49 7-8.77s-2.99-7.86-7-8.77z"/>
    `;
    setStatus('Respondiendo...', 'speaking');
  }

  function setThinkingState() {
    setStatus('Pensando', 'thinking');
    const label = document.getElementById('statusLabel');
    label.innerHTML = 'Pensando <span class="thinking-dots"><span>.</span><span>.</span><span>.</span></span>';
  }

  function setIdleState() {
    isSpeaking = false;
    isListening = false;
    const btn = document.getElementById('micBtn');
    const orb = document.getElementById('orb');
    const rings = ['ring1','ring2','ring3'].map(id => document.getElementById(id));
    btn.classList.remove('listening', 'speaking');
    orb.classList.remove('listening', 'speaking');
    rings.forEach(r => r.classList.remove('active'));
    document.getElementById('micIcon').innerHTML = `
      <path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/>
      <path d="M19 10v2a7 7 0 0 1-14 0v-2H3v2a9 9 0 0 0 8 8.94V23h2v-2.06A9 9 0 0 0 21 12v-2h-2z"/>
    `;
    setStatus('Presiona para hablar', '');
  }

  function setStatus(text, cls) {
    const el = document.getElementById('statusLabel');
    el.textContent = text;
    el.className = 'status-label ' + cls;
  }

  // ── Messages ───────────────────────────────────────────────────────────────
  function addMessage(role, text) {
    const area = document.getElementById('transcriptArea');
    const empty = document.getElementById('emptyState');
    if (empty) empty.remove();

    const msg = document.createElement('div');
    msg.className = 'msg ' + role;

    const label = document.createElement('div');
    label.className = 'msg-label';
    label.textContent = role === 'user' ? '▸ Tú' : '◆ Claude';

    const content = document.createElement('div');
    content.className = 'msg-text';
    content.textContent = text;

    msg.appendChild(label);
    msg.appendChild(content);
    area.appendChild(msg);
    area.scrollTop = area.scrollHeight;
  }

  function clearHistory() {
    conversationHistory = [];
    const area = document.getElementById('transcriptArea');
    area.innerHTML = '<div class="empty-state" id="emptyState">Conversación limpiada. Presiona el micrófono para comenzar.</div>';
    synth.cancel();
    setIdleState();
  }

  // ── Enter key for API input ────────────────────────────────────────────────
  document.getElementById('apiKey').addEventListener('keydown', e => {
    if (e.key === 'Enter') saveKey();
  });
</script>
</body>
</html>
